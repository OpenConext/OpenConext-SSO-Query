# Timeout setting for communication with the Data Service
connection.timeout.seconds=2

# API settings
# Url of the API which returns the SSO Query information.
api.endpoint.url=http://engine.vm.openconext.org:8080/whitelist

# The api-key header key and value - used in security purposes, is added to REST request
api.key.header.key=api-key
api.key.header.value=test

# Caching settings
# Fetch cache-hash schedule
dataservices.fetchCacheHash.cronSchedule=-
# Cache-hash url
api.cacheHash.url=http://localhost:3000/api/cache-hash/sso-query

# Indicate whether hostname wildcard functionality should be enabled. A configured url www.example.com will be
# changed to *.example.com which will match any subdomain before example.com, please note this is only applicable to
# one level.
host.wildcard.enabled=true

# Logging settings
logging.level.root=INFO
logging.level.nl=DEBUG

logging.authority=SSOQuery

data.location=
